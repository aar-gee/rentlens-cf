# RentLens — Cloudflare Workers config
# Local dev (`npm run dev` = `wrangler dev`) runs fully local: miniflare + a
# local D1. No Cloudflare login needed until Phase 6 (deploy + real D1).
name = "rentlens"
main = "src/index.tsx"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Static assets (compiled tailwind.css, HTMX, icons). Served for matching
# paths first; everything else falls through to the Hono Worker.
[assets]
directory = "./public"
binding = "ASSETS"

# Custom domain — wrangler provisions the DNS record + edge cert for the apex
# (zone must be in this Cloudflare account). www→apex is a separate edge
# Redirect Rule (set in the dashboard).
[[routes]]
pattern = "rentlens.fyi"
custom_domain = true

# D1 (SQLite). Real database created via `wrangler d1 create rentlens` (Phase 6).
[[d1_databases]]
binding = "DB"
database_name = "rentlens"
database_id = "9e77654d-f4c5-42a1-a9ab-e55d9b81d4e7"
migrations_dir = "migrations"

# R2 — proof-document uploads for /submit (rental agreements / lease screenshots).
# Bucket: `rentlens-proofs`. Worker writes via env.PROOFS. Created with
# `wrangler r2 bucket create rentlens-proofs` (one-time, after account-level R2
# enabled in the dashboard). All proof_upload code no-ops when env.PROOFS is
# absent so local dev / pre-binding deploys keep working.
[[r2_buckets]]
binding = "PROOFS"
bucket_name = "rentlens-proofs"

# ---------------------------------------------------------------------
# Staging environment — deploy with `wrangler deploy --env staging`.
# Served on the workers.dev subdomain (no apex), noindex. Its own D1 +
# its own secrets (staging admin creds + Turnstile TEST keys). Promote to
# prod only after verifying here.
# ---------------------------------------------------------------------
[env.staging]
name = "rentlens-staging"
workers_dev = true
# Explicitly NO routes — without this, the top-level [[routes]] (rentlens.fyi
# custom domain) is inherited and staging steals the production domain.
routes = []

[env.staging.assets]
directory = "./public"
binding = "ASSETS"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "rentlens-staging"
database_id = "0df82f6f-7a39-4c47-b877-468c6913c0c1"
migrations_dir = "migrations"

[[env.staging.r2_buckets]]
binding = "PROOFS"
bucket_name = "rentlens-proofs-staging"
