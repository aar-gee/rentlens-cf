<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="RentLens mark">
  <!--
    M3 — Slash + marigold dot. Mirrors the editorial / eyebrow motif
    used throughout the product as a section marker. Reads as both a
    typographic mark and an abstract logo.
  -->
  <rect width="64" height="64" fill="#F7F2EB"/>
  <line x1="22" y1="50" x2="42" y2="14" stroke="#1A1F26" stroke-width="3" stroke-linecap="square"/>
  <circle cx="48" cy="48" r="5" fill="#D4811F"/>
</svg>
